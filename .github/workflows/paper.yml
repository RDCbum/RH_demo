name: build-paper

on:
  push:
    branches:
      - release/arxiv
  pull_request:
    branches:
      - release/arxiv

jobs:
  build-paper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build PDF
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: arxiv_submission
          root_file: ERURH_Conditional_Proof.tex
          latexmk_use_xelatex: false
          latexmk_use_lualatex: false
          args: -pdf -interaction=nonstopmode -halt-on-error -file-line-error

      - name: Collect build log
        run: |
          if [ -f "arxiv_submission/ERURH_Conditional_Proof.log" ]; then
            cp "arxiv_submission/ERURH_Conditional_Proof.log" "arxiv_submission/paper_build.log"
          else
            echo "Missing log file" > "arxiv_submission/paper_build.log"
          fi

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: ERURH_Conditional_Proof_pdf
          path: |
            arxiv_submission/ERURH_Conditional_Proof.pdf
            arxiv_submission/paper_build.log
